name: API Tests

on:
  workflow_run:
    workflows: ["Docker Build and Push"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'docker'
        type: choice
        options:
          - local
          - docker
          - kubernetes

jobs:
  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: tests/postman/package-lock.json

      - name: Install Newman and dependencies
        working-directory: tests/postman
        run: npm install

      - name: Run local tests
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'local'
        working-directory: tests/postman
        run: npm run test:local

      - name: Run Docker tests
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'docker'
        working-directory: tests/postman
        run: npm run test:docker

      - name: Run Kubernetes tests
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'kubernetes'
        working-directory: tests/postman
        run: npm run test:kubernetes

      - name: Run tests after CI build
        if: github.event_name == 'workflow_run'
        working-directory: tests/postman
        run: npm run test:docker
